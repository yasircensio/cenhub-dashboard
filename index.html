            <h1>${esc(title)}</h1>
            <p>Sign in with your staff account to view sync run history.</p>
          </div>
          <div class="sync-history-page">
            <div class="sync-history-empty" style="padding:24px;text-align:center">
              <p style="margin-bottom:16px">Staff login is required. The public health endpoint shows DB totals, but this page reads authenticated sync history.</p>
              <a class="admin-btn admin-btn--primary" href="/login?next=${encodeURIComponent(`${window.location.pathname}${window.location.search}`)}">Sign in</a>
            </div>
          </div>
        `)}
      `;
    }

    async function loadSyncHistoryPage(kind, { silent = false } = {}) {
      const dashboard = document.getElementById('dashboard');
      if (!dashboard) return;

      const user = await fetchStaffMe();
      if (!user) {
        if (!silent) {
          dashboard.innerHTML = renderSyncHistoryLoginPrompt(kind);
        }
        return;
      }
      currentStaffUser = user;

      if (!silent) {
        dashboard.innerHTML = `
          ${renderBrandTopbar(renderStaffAdminChrome(kind === 'meta' ? 'meta-sync' : 'ghl-sync'))}
          ${wrapDashboardShell('<div class="loading-state"><div class="spinner"></div><p>Loading sync history...</p></div>')}
        `;
      }

      try {
        const data = await adminFetch(`/api/sync-history?type=${encodeURIComponent(kind)}&limit=150`);
        dashboard.innerHTML = renderSyncHistoryPage(kind, data);
        const refreshBtn = document.getElementById('sync-history-refresh');
        if (refreshBtn) {
          refreshBtn.onclick = () => loadSyncHistoryPage(kind);
        }
        const clearBtn = document.getElementById('sync-history-clear-log');
        if (clearBtn) {
          clearBtn.onclick = () => clearSyncHistoryLog(kind);
        }
        if (syncHistoryRefreshTimer) {
          clearInterval(syncHistoryRefreshTimer);
          syncHistoryRefreshTimer = null;
        }
        syncHistoryRefreshTimer = window.setInterval(() => {
          loadSyncHistoryPage(kind, { silent: true }).catch(() => {});
        }, 60_000);
      } catch (error) {
        dashboard.innerHTML = `
          ${renderBrandTopbar(renderStaffAdminChrome(kind === 'meta' ? 'meta-sync' : 'ghl-sync'))}
          ${wrapDashboardShell(`<div class="error-state" style="padding:24px">${esc(error.message)}</div>`)}
        `;
      }
    }

    let fbLeadSyncState = {
      clients: [],
      preflightByClient: {},
      historyRuns: [],
      activeRun: null,
      previewOkByClient: {},
      applyingRunId: null,
      isApplying: false,
      applyStartedAt: 0,
      applyWaitTimer: null,
      applyProgress: null,
    };
    let fbLeadSyncRefreshTimer = null;

    function clientFbLeadFieldReady(client) {
      const preflight = fbLeadSyncState.preflightByClient[client?.clientId];
      if (preflight?.fbLeadFieldMissing === true || preflight?.fbLeadFieldExists === false) return false;
      return true;
    }

    function getClientFbLeadFieldHint(client) {
      const preflight = fbLeadSyncState.preflightByClient[client?.clientId] || {};
      return preflight.fbLeadFieldHint
        || `Create a contact custom field named "Fb Lead id" in GHL (Settings → Custom Fields → Contact), then click Refresh.`;
    }

    function renderFbLeadFieldWarnings(clients) {
      const missing = (clients || []).filter((client) => !clientFbLeadFieldReady(client));
      if (!missing.length) return '';
      return missing.map((client) => `
        <div class="fb-lead-field-warning" id="fb-lead-field-warning-${esc(client.clientId)}">
          <strong>${esc(client.accountName)} — Fb Lead id field missing in GHL</strong>
          <p>${esc(getClientFbLeadFieldHint(client))}</p>
          <div class="fb-lead-field-warning-actions">
            <a class="admin-btn admin-btn--secondary admin-btn--small" href="/admin/${encodeURIComponent(client.clientId)}">Open client setup</a>
            <button class="admin-btn admin-btn--ghost admin-btn--small" type="button" onclick="loadFbLeadSyncPage()">Refresh check</button>
          </div>
        </div>
      `).join('');
    }

    function renderFbLeadReadinessBadges(client) {
      const preflight = fbLeadSyncState.preflightByClient[client.clientId] || {};
      const fieldOk = clientFbLeadFieldReady(client) && preflight.fbLeadFieldExists !== false;
      const checks = [
        { key: 'metaPageId', label: 'Page', ok: Boolean(client.metaPageId) },
        { key: 'ghl', label: 'GHL', ok: client.hasGhlToken && client.locationId },
        { key: 'metaToken', label: 'Meta token', ok: client.hasMetaToken },
        { key: 'field', label: 'Fb Lead id', ok: fieldOk },
      ];
      return `<div class="fb-lead-readiness">${checks.map((check) =>
        `<span class="fb-lead-badge${check.ok ? ' is-ok' : ' is-missing'}">${esc(check.label)}</span>`,
      ).join('')}</div>`;
    }

    function ghlContactUrl(locationId, contactId) {
      if (!locationId || !contactId) return null;
      return `https://app.gohighlevel.com/v2/location/${encodeURIComponent(locationId)}/contacts/detail/${encodeURIComponent(contactId)}`;
    }

    function fbLeadRunHasLaterSuccessfulRun(runs, run, { dryRunOnly = false, applyOnly = false } = {}) {
      const runTime = Date.parse(run.startedAt || '');
      if (!Number.isFinite(runTime)) return false;
      return (runs || []).some((other) => {
        if (other.id === run.id) return false;
        if (other.clientId !== run.clientId) return false;
        if ((other.mode || 'recent') !== (run.mode || 'recent')) return false;
        if (dryRunOnly && !other.dryRun) return false;
        if (applyOnly && other.dryRun) return false;
        const status = String(other.status || '').toLowerCase();
        if (status !== 'success' && status !== 'ok') return false;
        return Date.parse(other.startedAt || '') > runTime;
      });
    }

    function fbLeadRunHasLaterApply(runs, run) {
      return fbLeadRunHasLaterSuccessfulRun(runs, run, { applyOnly: true });
    }

    function dryRunIsReadyForApply(run, runs = fbLeadSyncState.historyRuns) {
      if (!run) return false;
      return Boolean(
        run.dryRun
        && String(run.status || '').toLowerCase() === 'success'
        && (run.updated || 0) > 0
        && !fbLeadRunHasLaterApply(runs, run)
        && !fbLeadRunHasLaterSuccessfulRun(runs, run, { dryRunOnly: true }),
      );
    }

    function findActionablePreviewRun(clientId, mode = 'backfill', runs = fbLeadSyncState.historyRuns) {
      return (runs || [])
        .filter((row) =>
          row.clientId === clientId
          && (row.mode || 'backfill') === mode
          && dryRunIsReadyForApply(row, runs),
        )
        .sort((a, b) => Date.parse(b.startedAt || '') - Date.parse(a.startedAt || ''))[0] || null;
    }

    function clientPreviewAllSynced(client) {
      if (!client?.lastRun) return false;
      const last = client.lastRun;
      return Boolean(
        last.dryRun
        && (last.mode || 'backfill') === 'backfill'
        && String(last.status || '').toLowerCase() === 'success'
        && (last.updated || 0) === 0
        && !findActionablePreviewRun(client.clientId, 'backfill'),
      );
    }

    function clientHasReadyPreview(client) {
      if (!client) return false;
      const cached = fbLeadSyncState.previewOkByClient[client.clientId];
      if (cached && (cached.updated || 0) > 0) {
        return Boolean(findActionablePreviewRun(client.clientId, cached.mode || 'backfill'));
      }
      return Boolean(findActionablePreviewRun(client.clientId, 'backfill'));
    }

    function clearFbLeadPreviewReady(clientId) {
      delete fbLeadSyncState.previewOkByClient[clientId];
      try {
        const stored = JSON.parse(sessionStorage.getItem('fbLeadSyncPreviewOk') || '{}');
        delete stored[clientId];
        sessionStorage.setItem('fbLeadSyncPreviewOk', JSON.stringify(stored));
      } catch {
        // ignore storage errors
      }
    }

    function markFbLeadPreviewReady(clientId, mode, updatedCount) {
      if ((updatedCount || 0) <= 0) {
        clearFbLeadPreviewReady(clientId);
        return;
      }
      fbLeadSyncState.previewOkByClient[clientId] = { mode, updated: updatedCount, at: Date.now() };
      try {
        const stored = JSON.parse(sessionStorage.getItem('fbLeadSyncPreviewOk') || '{}');
        stored[clientId] = { mode, updated: updatedCount, at: Date.now() };
        sessionStorage.setItem('fbLeadSyncPreviewOk', JSON.stringify(stored));
      } catch {
        // ignore storage errors
      }
    }

    function hydrateFbLeadPreviewState(clients) {
      try {
        const stored = JSON.parse(sessionStorage.getItem('fbLeadSyncPreviewOk') || '{}');
        for (const [clientId, meta] of Object.entries(stored)) {
          if ((meta?.updated || 0) > 0) {
            fbLeadSyncState.previewOkByClient[clientId] = meta;
          }
        }
      } catch {
        // ignore
      }
      for (const client of clients || []) {
        const actionable = findActionablePreviewRun(client.clientId, 'backfill');
        if (actionable) {
          fbLeadSyncState.previewOkByClient[client.clientId] = {
            mode: actionable.mode || 'backfill',
            updated: actionable.updated || 0,
            at: Date.parse(actionable.startedAt || '') || Date.now(),
          };
        } else {
          clearFbLeadPreviewReady(client.clientId);
        }
      }
    }

    function isPartialSyncRun(run) {
      if (!run) return false;
      const offset = Number(run.batchOffset) || 0;
      const total = Number(run.inWindow) || 0;
      if (total <= 0 || offset <= 0 || offset >= total) return false;
      const status = String(run.status || '').toLowerCase();
      return status === 'interrupted' || status === 'error' || status === 'running';
    }

    function findPartialSyncRun(clientId, mode = 'backfill', dryRun = false) {
      return (fbLeadSyncState.historyRuns || []).find((row) =>
        isPartialSyncRun(row)
        && row.clientId === clientId
        && Boolean(row.dryRun) === Boolean(dryRun)
        && (row.mode || 'backfill') === mode,
      ) || null;
    }

    function partialSyncRemaining(run) {
      return Math.max(0, (Number(run.inWindow) || 0) - (Number(run.batchOffset) || 0));
    }

    async function resumeFbLeadRunFromHistory(runId) {
      const run = fbLeadSyncState.historyRuns.find((row) => Number(row.id) === Number(runId));
      if (!run || !isPartialSyncRun(run)) {
        showToast('Nothing to resume for this run.', 'error');
        return;
      }
      const client = fbLeadSyncState.clients.find((row) => row.clientId === run.clientId);
      if (!clientFbLeadFieldReady(client)) {
        showToast(getClientFbLeadFieldHint(client), 'error');
        return;
      }
      const remaining = partialSyncRemaining(run);
      const label = run.dryRun ? 'preview' : 'apply';
      const confirmed = window.confirm(
        `Resume interrupted ${label} for ${run.clientId}?\n\n`
        + `${run.updated || 0} processed so far · ${remaining} lead(s) remaining.`,
      );
      if (!confirmed) return;

      fbLeadSyncState.activeRun = {
        clientId: run.clientId,
        mode: run.mode || 'backfill',
        runId: run.id,
        previewOk: !run.dryRun,
        previewRunId: run.dryRun ? null : run.id,
      };
      await runFbLeadSyncBatch({
        clientId: run.clientId,
        mode: run.mode || 'backfill',
        dryRun: Boolean(run.dryRun),
        resumeRunId: run.id,
      });
    }

    async function applyFbLeadSyncFromHistory(runId) {
      const run = fbLeadSyncState.historyRuns.find((row) => Number(row.id) === Number(runId));
      if (!run) {
        showToast('Run not found. Refresh the page.', 'error');
        return;
      }
      const client = fbLeadSyncState.clients.find((row) => row.clientId === run.clientId);
      if (!clientFbLeadFieldReady(client)) {
        showToast(getClientFbLeadFieldHint(client), 'error');
        return;
      }
      await applyFbLeadSync(run.clientId, run.mode || 'backfill', { previewRunId: runId });
    }

    async function applyFbLeadSync(clientId, mode = 'backfill', { previewRunId = null } = {}) {
      if (fbLeadSyncState.applyingRunId != null) {
        showToast('An apply is already running. Wait for it to finish.', 'error');
        return;
      }

      const client = fbLeadSyncState.clients.find((row) => row.clientId === clientId);
      if (!clientFbLeadFieldReady(client)) {
        showToast(getClientFbLeadFieldHint(client), 'error');
        return;
      }

      const previewRun = previewRunId != null
        ? fbLeadSyncState.historyRuns.find((row) => Number(row.id) === Number(previewRunId))
        : null;
      const hasPreview = previewRun
        ? dryRunIsReadyForApply(previewRun)
        : clientHasReadyPreview(client);

      if (mode === 'backfill' && !hasPreview) {
        showToast('No completed preview found. Run Preview first.', 'error');
        return;
      }

      const updatedCount = previewRun?.updated
        ?? fbLeadSyncState.previewOkByClient[clientId]?.updated
        ?? client?.lastRun?.updated
        ?? 0;

      const partialApply = findPartialSyncRun(clientId, mode, false);
      if (partialApply) {
        const remaining = partialSyncRemaining(partialApply);
        const confirmed = window.confirm(
          `An apply for ${clientId} was interrupted (${partialApply.updated || 0} already processed, ${remaining} remaining).\n\n`
          + 'Resume the interrupted apply instead of starting over?',
        );
        if (!confirmed) return;
        fbLeadSyncState.activeRun = {
          clientId,
          mode,
          runId: partialApply.id,
          previewOk: true,
          previewRunId,
        };
        await runFbLeadSyncBatch({
          clientId,
          mode,
          dryRun: false,
          resumeRunId: partialApply.id,
        });
        return;
      }

      const confirmed = window.confirm(
        `Apply ${mode === 'backfill' ? '90-day backfill' : 'recent sync'} for ${clientId}?\n\n`
        + `${updatedCount} contact(s) will get Fb Lead id written in GHL. This writes live data.`,
      );
      if (!confirmed) return;

      fbLeadSyncState.activeRun = {
        clientId,
        mode,
        runId: null,
        previewOk: true,
        previewRunId,
      };
      await runFbLeadSyncBatch({ clientId, mode, dryRun: false });
    }

    async function refreshFbLeadClientRowsUi() {
      const mount = document.getElementById('fb-lead-clients-mount');
      const warningsMount = document.getElementById('fb-lead-field-warnings-mount');
      if (mount) {
        mount.innerHTML = renderFbLeadClientRows(fbLeadSyncState.clients);
      }
      if (warningsMount) {
        warningsMount.innerHTML = renderFbLeadFieldWarnings(fbLeadSyncState.clients);
      }
      bindFbLeadSyncToggles();
    }

    function renderFbLeadClientActions(client) {
      const slug = esc(client.clientId);
      const setupLink = !client.metaPageId
        ? `<a class="admin-btn admin-btn--ghost admin-btn--small" href="/admin/${encodeURIComponent(client.clientId)}">Setup</a>`
        : '';
      return `
        <div class="fb-lead-client-actions">
          <button class="admin-btn admin-btn--secondary admin-btn--small" type="button"
            onclick="openFbLeadRunPanel('${slug}', 'recent')">Preview</button>
          <button class="admin-btn admin-btn--secondary admin-btn--small" type="button"
            onclick="openFbLeadRunPanel('${slug}', 'backfill')">Backfill</button>
          <button class="admin-btn admin-btn--ghost admin-btn--small" type="button"
            onclick="viewFbLeadClientHistory('${slug}')">View log</button>
          ${setupLink}
        </div>
      `;
    }

    function lastRunIsSuccessfulApply(lastRun) {
      if (!lastRun || lastRun.dryRun) return false;
      const status = String(lastRun.status || '').toLowerCase();
      return status === 'success' || status === 'ok';
    }

    function lastRunIsSuccessfulPreview(lastRun) {
      if (!lastRun || !lastRun.dryRun) return false;
      const status = String(lastRun.status || '').toLowerCase();
      return status === 'success' || status === 'ok';
    }

    function resolveFbLeadClientStats(client, preflight = {}) {
      const base = client?.displayStats || {};
      const metaLeads = preflight.metaLeadCount90d ?? base.metaLeadCount90d ?? null;
      const missing = preflight.estimatedMissing ?? base.outstanding ?? null;
      const missingTitle = preflight.estimatedMissing != null
        ? 'Estimated contacts still missing Fb Lead id (from a Meta sample)'
        : (base.outstandingHint || 'Estimated contacts still missing Fb Lead id (from a Meta sample)');

      return {
        metaLeads: metaLeads != null ? String(metaLeads) : '—',
        missing: missing != null ? String(missing) : '—',
        missingTitle,
      };
    }

    function formatFbLeadLastRunLabel(lastRun) {
      if (!lastRun) return '—';
      const parts = [
        lastRun.dryRun ? 'preview' : lastRun.status,
        `${lastRun.updated || 0} ${lastRun.dryRun ? 'would update' : 'updated'}`,
      ];
      if ((lastRun.skippedNoMatch ?? 0) > 0) {
        parts.push(`${lastRun.skippedNoMatch} no match`);
      }
      return parts.join(' · ');
    }

    function renderFbLeadClientRows(clients) {
      if (!clients.length) {
        return '<div class="sync-history-empty">No clients configured yet.</div>';
      }
      const rows = clients.map((client) => {
        const preflight = fbLeadSyncState.preflightByClient[client.clientId] || {};
        const stats = resolveFbLeadClientStats(client, preflight);
        const lastRunLabel = formatFbLeadLastRunLabel(client.lastRun);
        return `
          <tr>
            <td>
              <strong>${esc(client.accountName)}</strong><br>
              <span style="color:var(--text-soft);font-size:12px">${esc(client.clientId)}</span>
            </td>
            <td>
              <input type="checkbox" class="fb-lead-toggle" data-fb-sync-toggle="${esc(client.clientId)}"
                ${client.fbLeadSyncEnabled ? 'checked' : ''} aria-label="Enable auto-sync for ${esc(client.accountName)}" />
            </td>
            <td>${renderFbLeadReadinessBadges(client)}</td>
            <td>${esc(stats.metaLeads)}</td>
            <td title="${esc(stats.missingTitle || '')}">${esc(stats.missing)}</td>
            <td>${esc(lastRunLabel)}</td>
            <td class="fb-lead-client-actions-cell">${renderFbLeadClientActions(client)}</td>
          </tr>
        `;
      }).join('');

      return `
        <div class="sync-history-table-wrap">
          <table class="sync-history-table fb-lead-clients-table">
            <thead>
              <tr>
                <th>Client</th>
                <th>Auto-sync</th>
                <th>Ready?</th>
                <th>Meta leads (90d)</th>
                <th title="Before sync: estimated contacts missing Fb Lead id. After preview: would update count. After apply: Meta leads with no GHL match.">Outstanding</th>
                <th>Last run</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    }

    function renderFbLeadClientRowsWrapper(clients) {
      return `<div id="fb-lead-clients-mount">${renderFbLeadClientRows(clients)}</div>`;
    }

    function renderFbLeadHistoryRows(runs, locationByClient = {}) {
      if (!runs.length) {
        return '<div class="sync-history-empty">No FB lead sync runs logged yet.</div>';
      }
      const rows = runs.map((run) => {
        const detail = [
          run.mode,
          run.dryRun ? 'dry-run' : 'apply',
          run.dryRun ? `${run.updated || 0} would update` : `${run.updated || 0} updated`,
          `${run.skippedNoMatch || 0} no match`,
          run.errors ? `${run.errors} errors` : null,
        ].filter(Boolean).join(' · ');
        const canApply = dryRunIsReadyForApply(run, runs) && !fbLeadSyncState.isApplying;
        const canResume = isPartialSyncRun(run) && !fbLeadSyncState.isApplying;
        const isApplyingFromThis = fbLeadSyncState.isApplying && fbLeadSyncState.applyingRunId === run.id;
        const statusBadge = isApplyingFromThis
          ? renderSyncStatusBadge('applying')
          : renderSyncStatusBadge(run.status);
        return `
          <tr class="fb-lead-audit-row${isApplyingFromThis ? ' is-applying' : ''}">
            <td>${esc(formatSyncHistoryTimestamp(run.startedAt))}</td>
            <td>${esc(run.accountName || run.clientId)}</td>
            <td>${statusBadge}</td>
            <td>${esc(run.mode || 'recent')}</td>
            <td>${esc(formatSyncSource(run.source))}</td>
            <td class="sync-history-detail">${esc(detail)}</td>
            <td>
              <div class="fb-lead-history-actions">
                ${isApplyingFromThis
                  ? '<span class="fb-lead-history-status-note">In progress above</span>'
                  : (canResume
                    ? `<button class="admin-btn admin-btn--primary admin-btn--small" type="button" onclick="resumeFbLeadRunFromHistory(${Number(run.id)})">Resume (${partialSyncRemaining(run)})</button>`
                    : (canApply
                      ? `<button class="admin-btn admin-btn--primary admin-btn--small" type="button" data-fb-apply-run="${Number(run.id)}" data-apply-count="${Number(run.updated || 0)}" onclick="applyFbLeadSyncFromHistory(${Number(run.id)})">Apply (${run.updated})</button>`
                      : ''))}
                <button class="admin-btn admin-btn--ghost admin-btn--small" type="button" onclick="expandFbLeadRun(${Number(run.id)})">Audit</button>
                ${isStaffAdmin() ? `<button class="admin-btn admin-btn--ghost admin-btn--small" type="button" onclick="deleteFbLeadRun(${Number(run.id)})">Delete</button>` : ''}
              </div>
            </td>
          </tr>
          <tr id="fb-lead-run-audit-${Number(run.id)}" hidden>
            <td colspan="7"><div class="fb-lead-audit-scroll" id="fb-lead-audit-scroll-${Number(run.id)}">${renderFbLeadAuditTable(run.rows || [], locationByClient[run.clientId])}</div></td>
          </tr>
        `;
      }).join('');
      return `
        <div class="sync-history-table-wrap">
          <table class="sync-history-table">
            <thead>
              <tr>
                <th>Started</th>
                <th>Client</th>
                <th>Status</th>
                <th>Mode</th>
                <th>Source</th>
                <th>Summary</th>
                <th></th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    }

    function renderFbLeadAuditTable(rows, locationId) {
      if (!rows.length) {
        return '<div class="sync-history-empty" style="padding:12px">No contact-level rows stored for this run.</div>';
      }
      const body = rows.map((row) => {
        const ghlUrl = ghlContactUrl(locationId, row.contactId);
        const ghlLink = ghlUrl
          ? `<a href="${esc(ghlUrl)}" target="_blank" rel="noopener noreferrer">Open in GHL</a>`
          : '—';
        return `
          <tr>
            <td>${esc(row.email || row.phone || '—')}</td>
            <td><code>${esc(row.metaLeadId || '—')}</code></td>
            <td>${esc(row.contactId || '—')}</td>
            <td>${renderSyncStatusBadge(row.status)}</td>
            <td>${esc(row.error || '')}</td>
            <td>${ghlLink}</td>
          </tr>
        `;
      }).join('');
      const rowLabel = rows.length === 1 ? '1 contact row' : `${rows.length} contact rows`;
      return `
        <div class="fb-lead-audit-scroll-inner">
          <p style="color:var(--text-soft);font-size:12px;margin:0 0 8px;padding:8px 8px 0">${esc(rowLabel)} — scroll inside panel</p>
          <table class="sync-history-table">
            <thead>
              <tr>
                <th>Email / phone</th>
                <th>Meta lead id</th>
                <th>GHL contact</th>
                <th>Status</th>
                <th>Error</th>
                <th></th>
              </tr>
            </thead>
            <tbody>${body}</tbody>
          </table>
        </div>
      `;
    }

    function renderFbLeadSyncPage(data) {
      const summary = data.summary || {};
      return `
        ${renderBrandTopbar(renderStaffAdminChrome('fb-lead-sync'))}
        ${wrapDashboardShell(`
        <div class="page-hero admin-hub-hero">
          <div class="admin-breadcrumb">
            <a href="/admin">Clients</a>
            <span aria-hidden="true"> / </span>
            <span>FB lead sync</span>
          </div>
          <h1>Facebook Lead ID sync</h1>
          <p>Match Meta Lead Ads to GHL contacts and write the <code>Fb Lead id</code> custom field.</p>
        </div>
        <div class="sync-history-page">
          <div class="fb-lead-banner">
            Meta only stores Lead Ads for roughly the last <strong>90 days</strong>. Backfill cannot match older GHL contacts to leads outside that window.
          </div>
          <div class="sync-history-toolbar">
            <div class="sync-history-toolbar-actions">
              <a class="admin-btn admin-btn--secondary" href="/admin">← Back to clients</a>

    async function loadFbLeadPreflightForClients(clients, { quick = false } = {}) {
      const suffix = quick ? '&quick=1' : '';
      await Promise.all((clients || []).map(async (client) => {
        const prev = fbLeadSyncState.preflightByClient[client.clientId] || {};
        try {
          const next = await adminFetch(
            `/api/fb-lead-sync/preflight?client=${encodeURIComponent(client.clientId)}${suffix}`,
          );
          fbLeadSyncState.preflightByClient[client.clientId] = quick
            ? {
              ...next,
              metaLeadCount90d: next.metaLeadCount90d ?? prev.metaLeadCount90d ?? null,
              estimatedMissing: next.estimatedMissing ?? prev.estimatedMissing ?? null,
              sampleSize: next.sampleSize || prev.sampleSize || 0,
              sampleWouldUpdate: next.sampleWouldUpdate ?? prev.sampleWouldUpdate ?? 0,
            }
            : next;
        } catch (error) {
          fbLeadSyncState.preflightByClient[client.clientId] = {
            ...prev,
            preflightError: error.message,
          };
        }
      }));
    }

    function startGlobalApplyProgress(clientId, mode, contactCount = 0) {
      const mount = document.getElementById('fb-lead-apply-progress-mount');
      if (!mount) return;
      fbLeadSyncState.isApplying = true;
      fbLeadSyncState.applyStartedAt = Date.now();
      fbLeadSyncState.applyProgress = null;
      mount.innerHTML = renderGlobalApplyProgress(clientId, mode, contactCount);
      mount.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      if (fbLeadSyncState.applyWaitTimer) clearInterval(fbLeadSyncState.applyWaitTimer);
      fbLeadSyncState.applyWaitTimer = window.setInterval(() => {
        if (!fbLeadSyncState.isApplying) return;
        const elapsed = Math.floor((Date.now() - fbLeadSyncState.applyStartedAt) / 1000);
        const saved = fbLeadSyncState.applyProgress;
        if (saved?.total > 0) {
          updateGlobalApplyProgress({ ...saved, waiting: true, elapsed });
        } else {
          updateGlobalApplyProgress({ waiting: true, elapsed });
        }
      }, 1000);
    }

    function updateGlobalApplyProgress({
      processed,
      total,
      written,
      waiting = false,
      elapsed = 0,
      complete = false,
      error = '',
    } = {}) {
      const card = document.getElementById('fb-lead-global-progress-card');
      const progress = document.getElementById('fb-lead-global-progress');
      const bar = document.getElementById('fb-lead-global-progress-bar');
      const label = document.getElementById('fb-lead-global-progress-label');
      const stats = document.getElementById('fb-lead-global-progress-stats');
      const badge = document.getElementById('fb-lead-apply-status-badge');
      if (!card || !progress || !bar || !label) return;

      const prev = fbLeadSyncState.applyProgress || {};
      const nextProcessed = processed ?? prev.processed ?? 0;
      const nextTotal = total ?? prev.total ?? 0;
      const nextWritten = written ?? prev.written ?? 0;

      if (!complete && !error && (nextTotal > 0 || nextProcessed > 0)) {
        fbLeadSyncState.applyProgress = {
          processed: nextProcessed,
          total: nextTotal,
          written: nextWritten,
        };
      }

      const hasProgress = nextTotal > 0 || nextProcessed > 0;

      if (waiting && !hasProgress && !complete) {
        progress.classList.add('is-indeterminate');
        bar.style.width = '35%';
        if (stats) stats.textContent = 'Contacting Meta and GHL…';
        label.textContent = `Writing to GHL… (${elapsed}s — do not close this page)`;
        return;
      }

      progress.classList.remove('is-indeterminate');
      const pct = nextTotal > 0
        ? Math.min(100, Math.round((nextProcessed / nextTotal) * 100))
        : (complete ? 100 : 0);
      bar.style.width = `${pct}%`;
      if (stats) {
        stats.textContent = complete
          ? `${nextWritten} written to GHL · ${nextProcessed} / ${nextTotal} leads processed`
          : `${nextWritten} written · ${nextProcessed} / ${nextTotal} leads scanned (${pct}%)`;
      }
      if (complete) {
        card.classList.add('is-complete');
        card.classList.remove('is-error');
        label.textContent = `Complete — ${nextWritten} contact(s) updated in GHL`;
        if (badge) {
          badge.textContent = 'Complete';
          badge.classList.add('is-ok');
          badge.classList.remove('is-missing');
        }
      } else if (error) {
        card.classList.add('is-error');
        card.classList.remove('is-complete');
        label.textContent = error;
        if (badge) {
          badge.textContent = 'Failed';
          badge.classList.remove('is-ok');
          badge.classList.add('is-missing');
        }
      } else if (waiting && hasProgress) {
        label.textContent = nextProcessed >= nextTotal
          ? `Finishing up… (${elapsed}s)`
          : `Batch in progress — ${nextProcessed} / ${nextTotal} leads (${pct}%) · ${elapsed}s`;
      } else {
        label.textContent = `Writing to GHL — ${nextProcessed} / ${nextTotal} leads (${pct}%)`;
      }
    }

    function stopGlobalApplyProgress({ success = true, keepVisibleMs = 6000 } = {}) {
      fbLeadSyncState.isApplying = false;
      fbLeadSyncState.applyProgress = null;
      if (fbLeadSyncState.applyWaitTimer) {
        clearInterval(fbLeadSyncState.applyWaitTimer);

        const mount = document.getElementById('fb-lead-apply-progress-mount');

      if (progressLabel) {

    async function runFbLeadSyncBatch({ clientId, mode, dryRun, resumeRunId = null }) {
      const previewBtn = document.getElementById('fb-lead-preview-btn');
      const resultsMount = document.getElementById('fb-lead-run-results');
      if (previewBtn) previewBtn.disabled = true;

      const batchLimit = dryRun ? 12 : 10;
      const resumeRun = resumeRunId != null
        ? fbLeadSyncState.historyRuns.find((row) => Number(row.id) === Number(resumeRunId))
        : null;
      let runId = resumeRun?.id || fbLeadSyncState.activeRun?.runId || null;
      let offset = resumeRun ? (Number(resumeRun.batchOffset) || 0) : 0;
      let lastSummary = null;
      let allRows = [];
      let completed = false;
      const applyRunId = resumeRunId ?? fbLeadSyncState.activeRun?.previewRunId ?? null;
      const previewRun = applyRunId != null
        ? fbLeadSyncState.historyRuns.find((row) => Number(row.id) === Number(applyRunId))
        : null;
      const expectedContacts = resumeRun
        ? partialSyncRemaining(resumeRun)
        : (previewRun?.updated
          ?? fbLeadSyncState.previewOkByClient[clientId]?.updated
          ?? 0);

      if (!dryRun) {
        fbLeadSyncState.applyingRunId = applyRunId;
        startGlobalApplyProgress(clientId, mode, expectedContacts);
        await refreshFbLeadHistoryUi();
      }

      try {
        if (!resumeRunId) {
          const partial = findPartialSyncRun(clientId, mode, dryRun);
          if (partial) {
            const remaining = partialSyncRemaining(partial);
            const label = dryRun ? 'preview' : 'apply';
            const confirmed = window.confirm(
              `A ${label} for ${clientId} was interrupted (${partial.updated || 0} processed, ${remaining} remaining).\n\n`
              + `Resume the interrupted ${label}?`,
            );
            if (confirmed) {
              runId = partial.id;
              offset = Number(partial.batchOffset) || 0;
            }
          }
        }

        if (dryRun) {
          setFbLeadProgress({ processed: offset, total: 0, label: offset > 0 ? 'Resuming preview…' : 'Fetching Meta leads…' });
        } else {
          updateGlobalApplyProgress({ waiting: true, elapsed: 0 });
        }

        if (dryRun && offset === 0) {
          const prepared = await adminFetchWithRetry('/api/fb-lead-sync/prepare', {
            method: 'POST',
            body: JSON.stringify({
              clientId,
              mode,
              dryRun,
              runId,
            }),
          });
          const prep = prepared.summary || prepared;
          runId = prep.runId;
          offset = 0;
          setFbLeadProgress({
            processed: 0,
            total: prep.inWindow || 0,
            label: `Matching ${prep.inWindow || 0} Meta leads to GHL…`,
          });
        } else if (!dryRun && offset === 0) {
          updateGlobalApplyProgress({
            waiting: false,
            processed: 0,
            total: expectedContacts || previewRun?.updated || 0,
          });
        }

        do {
          lastSummary = await adminFetchWithRetry('/api/fb-lead-sync/run', {
            method: 'POST',
            body: JSON.stringify({
              clientId,
              mode,
              dryRun,
              runId,
              previewRunId: dryRun ? null : applyRunId,
              batchOffset: offset,
              batchLimit,
            }),
          });
          const summary = lastSummary.summary || lastSummary;
          runId = summary.runId;
          offset = summary.nextBatchOffset ?? (summary.batchOffset + (summary.batchProcessed || 0));
          allRows = allRows.concat(summary.rows || []);
          if (fbLeadSyncState.activeRun) {
            fbLeadSyncState.activeRun.runId = runId;
          }
          const total = summary.inWindow || offset || expectedContacts;
          if (dryRun) {
            setFbLeadProgress({
              processed: offset,
              total,
              complete: !summary.hasMore,
            });
            if (resultsMount) {
              resultsMount.innerHTML = renderFbLeadRunResults({ ...summary, rows: allRows });
            }
          } else {
            updateGlobalApplyProgress({
              processed: offset,
              total,
              written: summary.updated || 0,
              complete: !summary.hasMore,
            });
          }
        } while ((lastSummary.summary || lastSummary).hasMore);

        completed = true;
        const finalSummary = lastSummary.summary || lastSummary;
        const finalTotal = finalSummary.inWindow || offset || expectedContacts;
        const finalProcessed = finalSummary.nextBatchOffset ?? offset;

        if (dryRun) {
          setFbLeadProgress({
            processed: finalProcessed,
            total: finalTotal,
            complete: true,
          });
          markFbLeadPreviewReady(clientId, mode, finalSummary.updated);
          if (fbLeadSyncState.activeRun) {
            fbLeadSyncState.activeRun.previewOk = (finalSummary.updated || 0) > 0;
          }
          showToast(
            (finalSummary.updated || 0) > 0
              ? 'Preview complete — use Apply in Run history below.'
              : 'Preview complete — all contacts already have Fb Lead id. Nothing to apply.',
            'success',
          );
          await refreshFbLeadHistoryUi();
          document.getElementById('fb-lead-history-mount')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        } else {
          updateGlobalApplyProgress({
            processed: finalProcessed,
            total: finalTotal,
            written: finalSummary.updated || 0,
            complete: true,
          });
          delete fbLeadSyncState.previewOkByClient[clientId];
          try {
            const stored = JSON.parse(sessionStorage.getItem('fbLeadSyncPreviewOk') || '{}');
            delete stored[clientId];
            sessionStorage.setItem('fbLeadSyncPreviewOk', JSON.stringify(stored));
          } catch {
            // ignore
          }
          showToast('FB lead sync complete — Fb Lead id written to GHL', 'success');
          stopGlobalApplyProgress({ success: true });
        }
        await refreshFbLeadHistoryUi();
        const dash = await adminFetch('/api/fb-lead-sync');
        fbLeadSyncState.clients = dash.clients || [];
        hydrateFbLeadPreviewState(fbLeadSyncState.clients);
        await refreshFbLeadClientRowsUi();
      } catch (error) {
        if (dryRun) {
          hideFbLeadProgress(true);
        } else {
          updateGlobalApplyProgress({
            error: `Failed — ${error.message || 'Apply failed'}`,
          });
          stopGlobalApplyProgress({ success: false, keepVisibleMs: 12000 });
        }
        showToast(
          (error.message || (dryRun ? 'FB lead preview failed.' : 'FB lead apply failed.'))
          + (dryRun ? ' Partial progress is saved — use Resume in Run history or try Preview again.' : ' Partial progress is saved — use Resume in Run history.'),
          'error',
        );
        await refreshFbLeadHistoryUi();
      } finally {
        if (previewBtn) previewBtn.disabled = false;
        fbLeadSyncState.applyingRunId = null;
        if (!completed && dryRun) {
          hideFbLeadProgress(true);
        }
        if (!dryRun && !completed) {
          fbLeadSyncState.isApplying = false;
          await refreshFbLeadHistoryUi();
        }
      }
    }

    async function expandFbLeadRun(runId) {
      const row = document.getElementById(`fb-lead-run-audit-${runId}`);
      if (!row) return;

        row.hidden = true;
        return;
      }
      try {

    async function loadFbLeadSyncPage({ silent = false, fullPreflight = false } = {}) {
      const dashboard = document.getElementById('dashboard');
      if (!dashboard) return;

      const user = await fetchStaffMe();
      if (!user) {
        if (!silent) {
          dashboard.innerHTML = `
            ${renderBrandTopbar('')}
            ${wrapDashboardShell(`
              <div class="page-hero admin-hub-hero"><h1>FB lead sync</h1><p>Sign in to manage FB lead ID sync.</p></div>
              <div class="sync-history-page">
                <div class="sync-history-empty" style="padding:24px;text-align:center">

                </div>
              </div>
            `)}
          `;
        }
        return;
      }
      currentStaffUser = user;

      if (!silent) {
        dashboard.innerHTML = `
          ${renderBrandTopbar(renderStaffAdminChrome('fb-lead-sync'))}
          ${wrapDashboardShell('<div class="loading-state"><div class="spinner"></div><p>Loading FB lead sync...</p></div>')}
        `;
      }

      try {
        if (silent && fbLeadSyncState.isApplying) return;

        const [data] = await Promise.all([
          adminFetch('/api/fb-lead-sync'),
          loadFbLeadHistory(),
        ]);
        fbLeadSyncState.clients = data.clients || [];
        hydrateFbLeadPreviewState(fbLeadSyncState.clients);

        if (!silent) {
          dashboard.innerHTML = renderFbLeadSyncPage(data);
          bindFbLeadSyncToggles();
          const refreshBtn = document.getElementById('fb-lead-sync-refresh');
          if (refreshBtn) {
            refreshBtn.onclick = () => loadFbLeadSyncPage({ fullPreflight: true });
          }
          bindFbLeadHistoryClearButton();
          if (fbLeadSyncRefreshTimer) {
            clearInterval(fbLeadSyncRefreshTimer);
            fbLeadSyncRefreshTimer = null;
          }
          fbLeadSyncRefreshTimer = window.setInterval(() => {
            loadFbLeadSyncPage({ silent: true }).catch(() => {});
          }, 60_000);
        }

        if (!silent || fullPreflight) {
          await loadFbLeadPreflightForClients(fbLeadSyncState.clients, { quick: !fullPreflight });
        }
        if (silent) {
          await refreshFbLeadHistoryUi();
          await refreshFbLeadClientRowsUi();
        } else {
          await refreshFbLeadClientRowsUi();
        }

        if (fullPreflight) {
          await loadFbLeadPreflightForClients(fbLeadSyncState.clients, { quick: false });
          await refreshFbLeadClientRowsUi();
        } else if (!silent) {
          scheduleFbLeadFullPreflight(fbLeadSyncState.clients);
        }
      } catch (error) {
        if (!silent) {
          dashboard.innerHTML = `
            ${renderBrandTopbar(renderStaffAdminChrome('fb-lead-sync'))}
            ${wrapDashboardShell(`<div class="error-state" style="padding:24px">${esc(error.message)}</div>`)}
          `;
        }
      }

    let slugCheckTimer = null;

    function suggestNewClientSlug() {
      const name = document.getElementById('new-account-name')?.value || '';
      const slugInput = document.getElementById('new-client-slug');
      if (!slugInput || slugInput.dataset.userEdited === 'true') return;
      slugInput.value = name.trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      checkNewClientSlug();
    }

    function checkNewClientSlug() {
      const slugInput = document.getElementById('new-client-slug');
      if (slugInput) slugInput.dataset.userEdited = 'true';
      clearTimeout(slugCheckTimer);
      slugCheckTimer = setTimeout(async () => {
        const slug = document.getElementById('new-client-slug')?.value || '';
        const statusEl = document.getElementById('slug-status');
        if (!statusEl || !slug) {
          if (statusEl) statusEl.textContent = '';
          return;
        }
        try {
          const result = await adminFetch(`/api/clients/check-slug?slug=${encodeURIComponent(slug)}`);
          statusEl.className = `slug-status ${result.available ? 'ok' : 'bad'}`;
          statusEl.textContent = result.available
            ? `Available · ${result.adminUrl}`
            : `Unavailable (${result.reason || 'taken'})`;
        } catch (error) {
          statusEl.className = 'slug-status bad';
          statusEl.textContent = error.message;
        }
      }, 300);
    }

    async function createClient() {
      const accountName = document.getElementById('new-account-name')?.value?.trim();
      const clientId = document.getElementById('new-client-slug')?.value?.trim();
      const locationId = document.getElementById('new-location-id')?.value?.trim();
      if (!accountName || !clientId) {
        window.alert('Account name and slug are required.');
        return;
      }
      try {
        await adminFetch('/api/clients', {
          method: 'POST',
          body: JSON.stringify({ accountName, clientId, locationId: locationId || null }),
        });
        showToast('Client created', 'success');
        window.location.href = `/admin/${encodeURIComponent(clientId)}`;
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    let hubSyncPollTimer = null;
    let hubSyncPendingIds = new Set();
    let hubSyncPollStartedAt = 0;
    let hubSyncBaselineAt = new Map();

    function stopHubSyncPolling() {
      if (hubSyncPollTimer) {
        clearInterval(hubSyncPollTimer);
        hubSyncPollTimer = null;
      }
      hubSyncPendingIds = new Set();
      hubSyncPollStartedAt = 0;
      hubSyncBaselineAt = new Map();
    }

    function isClientSyncing(client) {
      return client.status === 'syncing' || client.lastSyncStatus === 'syncing';
    }

    function hubBatchStillPending(clients) {
      if (!hubSyncPendingIds.size) return false;
      const byId = new Map((clients || []).map((client) => [client.clientId, client]));
      for (const clientId of hubSyncPendingIds) {
        const client = byId.get(clientId);
        if (!client) continue;
        if (isClientSyncing(client)) return true;
        if (client.lastSyncStatus === 'error') continue;
        const baseline = hubSyncBaselineAt.get(clientId);
        if (baseline === client.lastSyncAt) return true;
      }
      return false;
    }

    async function pollHubSyncProgress() {
      if (!IS_ADMIN_HUB || !document.getElementById('client-grid')) {
        stopHubSyncPolling();
        return;
      }

      if (hubSyncPollStartedAt && Date.now() - hubSyncPollStartedAt > 15 * 60 * 1000) {
        stopHubSyncPolling();
        showToast('Some sync jobs are still running. Refresh the page in a minute.', 'error');
        return;
      }

      try {
        const data = await adminFetch('/api/clients');
        const clients = data.clients || [];
        updateHubCardsFromClients(clients);

        if (hubBatchStillPending(clients)) return;

        const pendingIds = new Set(hubSyncPendingIds);
        stopHubSyncPolling();
        const dashboard = document.getElementById('dashboard');
        if (dashboard) {
          dashboard.innerHTML = renderAdminHubPage(clients);
        }
        const failed = clients.filter((client) =>
          pendingIds.has(client.clientId) && client.lastSyncStatus === 'error',
        );
        if (failed.length) {
          showToast(`${failed.length} sync(s) failed`, 'error');
        } else {
          showToast('All clients synced', 'success');
        }
      } catch {
        // Keep polling while background jobs run.
      }
    }

    function startHubSyncPolling(clientIds = [], clients = []) {
      stopHubSyncPolling();
      hubSyncPendingIds = new Set(clientIds);
      hubSyncPollStartedAt = Date.now();
      hubSyncBaselineAt = new Map(
        (clients || [])
          .filter((client) => clientIds.includes(client.clientId))
          .map((client) => [client.clientId, client.lastSyncAt]),
      );
      markHubCardsSyncing(clientIds);
      pollHubSyncProgress();
      hubSyncPollTimer = setInterval(pollHubSyncProgress, 3000);
    }
    function markHubCardsSyncing(clientIds = []) {
      clientIds.forEach((clientId) => {
        const card = document.querySelector(`.client-card[data-client-id="${clientId}"]`);
        if (!card) return;
        const badge = card.querySelector('.status-badge');
        if (badge) {
          badge.className = 'status-badge status-syncing';
          badge.textContent = statusLabel('syncing');
        }
        const meta = card.querySelector('[data-sync-meta]');
        if (meta) meta.textContent = 'Syncing now...';
      });
    }

    function updateHubCardsFromClients(clients) {
      (clients || []).forEach((client) => {
        const card = document.querySelector(`.client-card[data-client-id="${client.clientId}"]`);
        if (!card) return;
        const badge = card.querySelector('.status-badge');
        if (badge) {
          badge.className = `status-badge status-${client.status}`;
          badge.textContent = statusLabel(client.status);
        }
        const meta = card.querySelector('[data-sync-meta]');
        if (meta) meta.textContent = formatRelativeSync(client.lastSyncAt, client.status);
      });
    }

    async function syncAllClients(button) {
      if (button) button.disabled = true;
      try {
        showToast('Syncing all clients...');
        const data = await adminFetch('/api/clients', {
          method: 'POST',
          body: JSON.stringify({ action: 'sync-all' }),
        });

        if (data.queued) {
          const count = data.count ?? (data.clientIds || []).length;
          showToast(`Syncing ${count} client${count === 1 ? '' : 's'} in background`, 'success');
          const hubData = await adminFetch('/api/clients');
          startHubSyncPolling(data.clientIds || [], hubData.clients || []);
          return;
        }

        const failed = (data.results || []).filter((row) => !row.success);
        if (failed.length) {
          showToast(`${failed.length} sync(s) failed`, 'error');
        } else {
          showToast('All clients synced', 'success');
        }
        await loadAdminHub();
      } catch (error) {
        showToast(error.message, 'error');
      } finally {
        if (button) button.disabled = false;
      }
    }

    async function deleteClient(clientId) {
      const label = clientId;
      const ok = window.confirm(
        `Delete "${label}" permanently?\n\nThis removes the account, GHL token, and all synced snapshot data. This cannot be undone.`,
      );
      if (!ok) return;

      const typed = window.prompt(`Type "${clientId}" to confirm deletion:`);
      if (typed !== clientId) {
        showToast('Deletion cancelled — slug did not match.', 'error');
        return;
      }

      try {
        await adminFetch(`/api/clients/${encodeURIComponent(clientId)}`, { method: 'DELETE' });
        showToast(`Deleted ${clientId}`, 'success');
        if (IS_ADMIN_HUB) {
          await loadAdminHub();
        } else {
          window.location.href = '/admin';
        }
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    async function syncClient(clientId, button) {
      if (button) {
        button.disabled = true;
        button.textContent = 'Syncing...';
      }
      try {
        await adminFetch(`/api/clients/${encodeURIComponent(clientId)}/sync`, { method: 'POST', body: '{}' });
        showToast('Sync completed', 'success');
        if (IS_ADMIN_HUB) await loadAdminHub();
        else if (IS_ADMIN_CLIENT) {
          await loadSetupAccount();
          if (accountCanPreviewDashboard(setupAccount)) loadDashboard(true, { background: true });
        }
        else loadDashboard(true, { background: true });
      } catch (error) {
        showToast(error.message, 'error');
      } finally {
        if (button) {
          button.disabled = false;
          const label = button.dataset.syncLabel || 'Sync';
          button.innerHTML = button.dataset.syncLabel ? `${ICON_SYNC} ${label}` : label;
        }
      }
    }

    function getMetricsModelLabels(account, pipelines = setupPipelines) {
      const pipelineMap = new Map((pipelines || []).map((pipeline) => [pipeline.id, pipeline.name]));
      if (account.dedupeEnabled) {
        const winName = pipelineMap.get(account.winPipelineId) || account.winPipelineId || '—';
        return {
          typeLabel: 'Funnel + deduplication',
          winLabel: `Win pipeline: ${winName}`,
        };
      }
      if (account.winPipelineId) {
        const winName = pipelineMap.get(account.winPipelineId) || account.winPipelineId;
        return {
          typeLabel: 'Simple (single win pipeline)',
          winLabel: `Win pipeline: ${winName}`,
        };
      }
      return {
        typeLabel: 'Simple (no deduplication)',
        winLabel: 'All won opportunities',
      };
    }

    const ICON_CHECK = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';

    function updateMetricsApplyState() {
      const btn = document.getElementById('metrics-apply-btn');
      if (!btn || !metricsModelChangeMode) return;
      const ack = Boolean(document.getElementById('metrics-acknowledge-impact')?.checked);
      const slug = document.getElementById('metrics-confirm-slug')?.value?.trim() || '';
      btn.disabled = !(ack && slug === CLIENT_SLUG);
    }

    function onMetricsModelTypeChange() {
      const mode = document.querySelector('input[name="metrics-model-type"]:checked')?.value;
      const wrap = document.getElementById('metrics-win-pipeline-wrap');
      if (wrap) wrap.style.display = mode === 'dedupe' ? '' : 'none';
    }

    async function saveMetricsModel() {
      const mode = document.querySelector('input[name="metrics-model-type"]:checked')?.value || 'simple';
      const dedupeEnabled = mode === 'dedupe';
      const winPipelineId = dedupeEnabled
        ? (document.getElementById('metrics-win-pipeline')?.value || null)
        : null;

      if (dedupeEnabled && !winPipelineId) {
        showToast('Select a win pipeline for deduplication mode.', 'error');
        return;
      }

      const payload = {
        dedupeEnabled,
        winPipelineId,
        afterSalesPipelineId: dedupeEnabled ? winPipelineId : undefined,
      };

      if (metricsModelChangeMode) {
        payload.confirmSlug = document.getElementById('metrics-confirm-slug')?.value?.trim() || '';
        payload.acknowledgeImpact = Boolean(document.getElementById('metrics-acknowledge-impact')?.checked);
      }

      try {
        await adminFetch(`/api/clients/${encodeURIComponent(CLIENT_SLUG)}/metrics-model`, {
          method: 'POST',
          body: JSON.stringify(payload),
        });
        metricsModelChangeMode = false;
        showToast('Metrics model saved', 'success');
        await loadSetupAccount();
        if (accountCanPreviewDashboard(setupAccount)) {
          loadDashboard(true, { background: true });
        }
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    function startMetricsModelChange() {
      metricsModelChangeMode = true;
      if (setupAccount) {
        const panel = document.getElementById('setup-panel-mount');
        if (panel) panel.innerHTML = renderClientSetupPanel(setupAccount);
      }
    }

    function cancelMetricsModelChange() {
      metricsModelChangeMode = false;
      if (setupAccount) {
        const panel = document.getElementById('setup-panel-mount');
        if (panel) panel.innerHTML = renderClientSetupPanel(setupAccount);
      }
    }

      if (!IS_ADMIN_CLIENT) return;
      try {
        const data = await adminFetch(`/api/clients/${encodeURIComponent(CLIENT_SLUG)}`);
        setupAccount = data.account;
        if (setupAccount.accessKey && !CLIENT_ACCESS_KEY) {
          CLIENT_ACCESS_KEY = setupAccount.accessKey;
        }
        if (setupAccount.newLeadsPipelineId && !setupPipelines.length) {
          await fetchSetupPipelines(true);
        }
        const panel = document.getElementById('setup-panel-mount');
        if (panel) panel.innerHTML = renderClientSetupPanel(setupAccount);
      } catch (error) {
        const panel = document.getElementById('setup-panel-mount');
        if (panel) {
          panel.innerHTML = `<div class="note" style="padding:24px">${esc(error.message)}</div>`;
        }
        showToast(error.message, 'error');
        throw error;
      }
    }

    async function fetchSetupPipelines(silent = false, button = null) {
      if (button) {
        button.disabled = true;
        button.textContent = 'Fetching...';
      }
      try {
        const data = await adminFetch(`/api/clients/${encodeURIComponent(CLIENT_SLUG)}/sync-pipelines`, {
          method: 'POST',
          body: '{}',
        });
        setupPipelines = data.pipelines || [];
        if (!silent) showToast(`${setupPipelines.length} pipeline(s) loaded`, 'success');
        await loadSetupAccount();
      } catch (error) {
        showToast(error.message, 'error');
      } finally {
        if (button) {
          button.disabled = false;
          const label = button.dataset.syncLabel || 'Fetch pipelines from GHL';
          button.innerHTML = `${ICON_SYNC} ${label}`;
        }
      }
    }

    function collectMetaSetupPayload() {
      const payload = {
        metaAdAccountId: document.getElementById('setup-meta-ad-account-id')?.value?.trim() || null,
        metaPageId: document.getElementById('setup-meta-page-id')?.value?.trim() || null,
        metaPixelId: document.getElementById('setup-meta-pixel-id')?.value?.trim() || null,
        facebookClientId: document.getElementById('setup-facebook-client-id')?.value?.trim() || null,
        fbLeadSyncEnabled: Boolean(document.getElementById('setup-fb-lead-sync-enabled')?.checked),
        ghlFbLeadFieldId: document.getElementById('setup-ghl-fb-lead-field-id')?.value?.trim() || null,
      };
      const metaSystemToken = document.getElementById('setup-meta-system-token')?.value?.trim();
      if (metaSystemToken) payload.metaSystemUserToken = metaSystemToken;
      const metaPageToken = document.getElementById('setup-meta-page-token')?.value?.trim();
      if (metaPageToken) payload.metaPageAccessToken = metaPageToken;
      return payload;

    async function clearMetaSystemUserToken(slug) {
      try {
        await adminFetch(`/api/clients/${encodeURIComponent(slug)}`, {
          method: 'PUT',
          body: JSON.stringify({ clearMetaSystemUserToken: true }),
        });
        showToast('Saved Meta token override cleared — using Vercel env token', 'success');
        await loadSetupAccount();
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    async function saveSetupAccount() {
      try {
        const accountName = document.getElementById('setup-account-name')?.value?.trim();
        if (!accountName) {
          showToast('Dashboard heading is required.', 'error');
          return;
        }
        const payload = {
          accountName,
          locationId: document.getElementById('setup-location-id')?.value?.trim() || null,
          timezone: document.getElementById('setup-timezone')?.value?.trim() || 'Europe/Copenhagen',
          newLeadsPipelineId: document.getElementById('setup-new-leads')?.value || null,
          salesPipelineId: document.getElementById('setup-sales')?.value || null,
          afterSalesPipelineId: document.getElementById('setup-after-sales')?.value || null,
          readyForGhl: Boolean(document.getElementById('setup-ready-ghl')?.checked),
          ...collectMetaSetupPayload(),
        };
        const token = document.getElementById('setup-ghl-token')?.value?.trim();
        if (token) payload.ghlToken = token;
        await adminFetch(`/api/clients/${encodeURIComponent(CLIENT_SLUG)}`, {
          method: 'PUT',
          body: JSON.stringify(payload),
        });
        showToast('Account saved', 'success');
        await loadSetupAccount();
        if (accountCanPreviewDashboard(setupAccount)) {
          loadDashboard(true);
        }
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    async function syncMetaMetricsClient(slug) {
      try {
        const metaPayload = collectMetaSetupPayload();
        if (!metaPayload.metaAdAccountId) {
          showToast('Enter a Meta Ad Account ID first.', 'error');
          return;
        }
        showToast('Saving Meta settings and syncing…', 'info');
        const metaSystemToken = document.getElementById('setup-meta-system-token')?.value?.trim();
        if (!metaSystemToken) metaPayload.clearMetaSystemUserToken = true;
        const result = await adminFetch(`/api/clients/${encodeURIComponent(slug)}/sync-meta`, {
          method: 'POST',
          body: JSON.stringify(metaPayload),
        });
        if (result.skipped) {
          showToast(result.reason || 'Meta sync skipped', 'error');
        } else {
          let msg = 'Meta metrics synced';
          if (result.tokenSource) msg += ` (${result.tokenSource} token)`;
          if (result.ignoredAccountOverride) msg += ' — cleared invalid saved token override';
          showToast(msg, 'success');
        }
        await loadSetupAccount();
        if (accountCanPreviewDashboard(setupAccount)) {
          loadDashboard(true);
        }
      } catch (error) {
        showToast(error.message, 'error');
        await loadSetupAccount();
      }
    }

        const match = String(weekKey).match(/^(\d{4})-W(\d{2})$/);
        if (!match) return null;

        const isoWeek = Number(match[2]);
        const jan4 = new Date(Date.UTC(isoYear, 0, 4));
        const jan4Day = jan4.getUTCDay() || 7;
        const mondayWeek1 = new Date(jan4);
        mondayWeek1.setUTCDate(jan4.getUTCDate() - jan4Day + 1);

        const monday = new Date(mondayWeek1);
        monday.setUTCDate(mondayWeek1.getUTCDate() + (isoWeek - 1) * 7);

        const thursday = new Date(monday);
        thursday.setUTCDate(monday.getUTCDate() + 3);

        return {
          monday: new Date(monday.getUTCFullYear(), monday.getUTCMonth(), monday.getUTCDate()),
          thursday: new Date(thursday.getUTCFullYear(), thursday.getUTCMonth(), thursday.getUTCDate()),

      function countMondayOfMonth(date) {
        let mondayCount = 0;
        for (let day = 1; day <= date.getDate(); day += 1) {

            mondayCount += 1;

        if (!canvas) return;

        const wrapper = canvas.closest('.chart-card');

        const chartType = definition?.defaultType || 'bar';
        const config = DashboardCharts.buildChartConfig(chartId, data, chartType);

          canvas.style.display = 'none';
