name: FB Lead ID Sync

# Vercel Hobby only allows once-per-day crons, so FB lead sync runs via GitHub Actions.
# TEMP: every 5 minutes for testing — change back to '0 * * * *' for hourly in production.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger FB lead ID sync on production
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "Missing GitHub secret: CRON_SECRET"
            exit 1
          fi
          BASE_URL="${APP_BASE_URL:-https://cenhub-dashboard.vercel.app}"
          BASE_URL="${BASE_URL%/}"
          echo "Calling ${BASE_URL}/api/fb-lead-sync-cron"
          curl -sfS --retry 2 --retry-delay 5 --max-time 300 \
            -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "X-Cron-Source: github-actions" \
            "${BASE_URL}/api/fb-lead-sync-cron" | tee /tmp/fb-lead-sync-response.json
          echo ""
          echo "FB lead sync cron completed."
