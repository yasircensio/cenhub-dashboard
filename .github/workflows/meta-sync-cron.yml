name: Meta sync cron

on:
  schedule:
    # GitHub Actions minimum interval is 5 minutes.
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger production Meta sync
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "Add CRON_SECRET to GitHub repository secrets (same value as Vercel Production)."
            exit 1
          fi
          curl -fsS -X POST "https://cenhub-dashboard.vercel.app/api/meta-sync-inngest" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{"runId":"github-actions","schedule":"*/5 * * * *"}'
