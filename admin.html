<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cenhub Admin</title>
  <!-- theme: warm-cream v27 -->
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body>
  <script>
    (function () {
      var parts = window.location.pathname.replace(/^\/+|\/+$/g, '').split('/').filter(Boolean);
      if (parts[0] === 'admin' && parts[1] === 'sync-history' && (parts[2] === 'ghl' || parts[2] === 'meta')) {
        document.body.dataset.dashboardMode = 'sync-history-' + parts[2];
      } else if (parts[0] === 'admin' && parts[1] === 'fb-lead-sync') {
        document.body.dataset.dashboardMode = 'fb-lead-sync';
      } else if (parts[0] === 'login') {
        document.body.dataset.dashboardMode = 'login';
      } else if (parts[0] === 'team') {
        document.body.dataset.dashboardMode = 'team';
      } else if (parts[0] === 'admin') {
        document.body.dataset.dashboardMode = parts.length >= 2 ? 'admin' : 'hub';
        if (parts.length >= 2) document.body.dataset.clientSlug = parts[1];
      }
    }());
  </script>
  <div id="toast-host" class="toast-host" aria-live="polite"></div>
  <div class="dashboard" id="dashboard">
    <header class="brand-topbar">
      <div class="brand-topbar-inner">
        <div class="brand-topbar-left">
          <img class="brand-logo" src="/cenhub-logo-white.png" alt="Cenhub" width="167" height="41" />
        </div>
      </div>
    </header>
    <div class="dashboard-shell">
      <div class="loading-state">
        <div class="spinner"></div>
        <p id="initial-loading-msg">Loading...</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <script src="/lib/marketing-metrics.js" defer></script>
  <script src="/js/admin.bundle.js?v=41" defer></script>
</body>
</html>
